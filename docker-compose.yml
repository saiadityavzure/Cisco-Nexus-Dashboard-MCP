services:
  ndfc-mcp:
    build: .
    container_name: ndfc-mcp
    env_file: .env
    environment:
      TRANSPORT: http
      HOST: 0.0.0.0
      PORT: 9007
    ports:
      - "9007:9007"
    volumes:
      - ./src:/app/src
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import ndfc_mcp"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
